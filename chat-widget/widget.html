<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Chat Widget Demo</title>
<style>
body { font-family: sans-serif; background: #f0f2f5; margin: 0; padding: 40px; }
h1 { color: #333; }

/* ── Widget styles ── */
#chat-widget-btn {
  position: fixed; bottom: 24px; right: 24px; width: 60px; height: 60px;
  background: #2563eb; border-radius: 50%; border: none; cursor: pointer;
  box-shadow: 0 4px 20px rgba(37,99,235,.5); display: flex; align-items: center;
  justify-content: center; z-index: 9999; transition: transform .2s;
}
#chat-widget-btn:hover { transform: scale(1.1); }
#chat-widget-btn svg { width: 28px; height: 28px; fill: white; }

#chat-widget-box {
  position: fixed; bottom: 96px; right: 24px; width: 360px; height: 480px;
  background: #fff; border-radius: 16px; box-shadow: 0 8px 40px rgba(0,0,0,.18);
  display: none; flex-direction: column; overflow: hidden; z-index: 9998;
}
#chat-widget-box.open { display: flex; }

#chat-header {
  background: #2563eb; color: #fff; padding: 16px 20px;
  display: flex; align-items: center; gap: 12px;
}
#chat-header .avatar {
  width: 38px; height: 38px; background: rgba(255,255,255,.2);
  border-radius: 50%; display: flex; align-items: center; justify-content: center;
  font-size: 18px;
}
#chat-header .info { flex: 1; }
#chat-header .name  { font-weight: 700; font-size: .95rem; }
#chat-header .status { font-size: .75rem; opacity: .8; }
#chat-header .close  { cursor: pointer; opacity: .8; font-size: 20px; }
#chat-header .close:hover { opacity: 1; }

#chat-messages {
  flex: 1; overflow-y: auto; padding: 16px; display: flex;
  flex-direction: column; gap: 10px; background: #f8fafc;
}
.msg { max-width: 80%; padding: 10px 14px; border-radius: 12px; font-size: .88rem; line-height: 1.5; }
.msg.bot  { background: #fff; border: 1px solid #e2e8f0; align-self: flex-start; border-bottom-left-radius: 4px; }
.msg.user { background: #2563eb; color: #fff; align-self: flex-end; border-bottom-right-radius: 4px; }
.msg .time { font-size: .7rem; opacity: .6; margin-top: 4px; }
.typing { display: flex; gap: 4px; padding: 10px 14px; }
.typing span { width: 8px; height: 8px; background: #94a3b8; border-radius: 50%; animation: bounce .8s infinite; }
.typing span:nth-child(2) { animation-delay: .15s; }
.typing span:nth-child(3) { animation-delay: .3s; }
@keyframes bounce { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-6px)} }

#chat-input-area {
  padding: 12px 16px; border-top: 1px solid #e2e8f0;
  display: flex; gap: 8px; background: #fff;
}
#chat-input {
  flex: 1; border: 1px solid #e2e8f0; border-radius: 24px;
  padding: 10px 16px; font-size: .88rem; outline: none; resize: none;
  font-family: inherit;
}
#chat-input:focus { border-color: #2563eb; }
#chat-send {
  width: 40px; height: 40px; background: #2563eb; border: none; border-radius: 50%;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; transition: background .2s;
}
#chat-send:hover { background: #1d4ed8; }
#chat-send svg  { width: 18px; height: 18px; fill: white; }

.badge {
  position: absolute; top: -4px; right: -4px; background: #ef4444;
  color: #fff; border-radius: 50%; width: 20px; height: 20px;
  font-size: .7rem; display: flex; align-items: center; justify-content: center;
  font-weight: 700;
}
</style>
</head>
<body>
<h1>Демо: Chat Widget для сайта</h1>
<p>Этот виджет продаётся как готовое решение за $150–300.<br>
Встраивается на любой сайт одной строкой кода.</p>
<p style="color:#666">Нажми на синюю кнопку справа внизу 👇</p>

<!-- ── Chat Button ── -->
<button id="chat-widget-btn">
  <svg viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm-2 12H6v-2h12v2zm0-3H6V9h12v2zm0-3H6V6h12v2z"/></svg>
  <span class="badge" id="chat-badge">1</span>
</button>

<!-- ── Chat Box ── -->
<div id="chat-widget-box">
  <div id="chat-header">
    <div class="avatar">🤖</div>
    <div class="info">
      <div class="name">AI Ассистент</div>
      <div class="status">● Онлайн</div>
    </div>
    <span class="close" id="chat-close">✕</span>
  </div>
  <div id="chat-messages">
    <div class="msg bot">
      Привет! 👋 Я AI-ассистент. Чем могу помочь?
      <div class="time">сейчас</div>
    </div>
  </div>
  <div id="chat-input-area">
    <textarea id="chat-input" rows="1" placeholder="Напишите сообщение..."></textarea>
    <button id="chat-send">
      <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
    </button>
  </div>
</div>

<script>
// ── Config ────────────────────────────────────────────────────────────────────
const API_URL   = "/api/chat";   // Your backend endpoint
const BOT_NAME  = "AI Ассистент";
// ─────────────────────────────────────────────────────────────────────────────

const btn      = document.getElementById("chat-widget-btn");
const box      = document.getElementById("chat-widget-box");
const closeBtn = document.getElementById("chat-close");
const messages = document.getElementById("chat-messages");
const input    = document.getElementById("chat-input");
const send     = document.getElementById("chat-send");
const badge    = document.getElementById("chat-badge");

let history = [];

btn.onclick = () => {
  box.classList.toggle("open");
  badge.style.display = "none";
};
closeBtn.onclick = () => box.classList.remove("open");

function now() {
  return new Date().toLocaleTimeString("ru", {hour:"2-digit", minute:"2-digit"});
}

function addMsg(text, role) {
  const div = document.createElement("div");
  div.className = "msg " + role;
  div.innerHTML = text.replace(/\n/g,"<br>") + `<div class="time">${now()}</div>`;
  messages.appendChild(div);
  messages.scrollTop = messages.scrollHeight;
}

function showTyping() {
  const d = document.createElement("div");
  d.className = "msg bot typing"; d.id = "typing";
  d.innerHTML = "<span></span><span></span><span></span>";
  messages.appendChild(d);
  messages.scrollTop = messages.scrollHeight;
}
function hideTyping() {
  const t = document.getElementById("typing");
  if (t) t.remove();
}

async function sendMessage() {
  const text = input.value.trim();
  if (!text) return;
  input.value = "";
  addMsg(text, "user");
  history.push({role:"user", content:text});
  showTyping();

  try {
    const res = await fetch(API_URL, {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify({message: text, history})
    });
    const data = await res.json();
    hideTyping();
    addMsg(data.reply, "bot");
    history.push({role:"assistant", content:data.reply});
  } catch(e) {
    hideTyping();
    // Demo mode: echo response
    addMsg("Спасибо за сообщение! Мы свяжемся с вами в ближайшее время.", "bot");
  }
}

send.onclick = sendMessage;
input.onkeydown = e => { if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMessage(); } };
input.oninput = () => { input.style.height = "auto"; input.style.height = Math.min(input.scrollHeight,120)+"px"; };
</script>
</body>
</html>
